<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DB中間試験対策 4択クイズ</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --success-color: #2ecc71;
            --error-color: #e74c3c;
            --background-color: #f5f7fa;
            --card-color: #ffffff;
            --text-color: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .quiz-container {
            background-color: var(--card-color);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 30px;
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 10px;
        }

        .progress {
            font-size: 0.9rem;
            color: #718096;
            font-weight: bold;
        }

        .score {
            font-size: 0.9rem;
            color: var(--primary-color);
            font-weight: bold;
        }

        .question-box {
            font-size: 1.2rem;
            font-weight: 600;
            line-height: 1.6;
            margin-bottom: 30px;
            min-height: 80px;
        }

        .options-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
            margin-bottom: 25px;
        }

        .option-btn {
            background-color: #ffffff;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px 20px;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            font-weight: 500;
        }

        /* iPad等でのホバー・アクティブ時の挙動 */
        @media (hover: hover) {
            .option-btn:hover:not([disabled]) {
                border-color: var(--primary-color);
                background-color: #f0f7ff;
            }
        }

        .option-btn:active:not([disabled]) {
            transform: scale(0.98);
        }

        /* 正解・不正解のスタイル */
        .option-btn.correct {
            background-color: #e8f5e9;
            border-color: var(--success-color);
            color: #2e7d32;
        }

        .option-btn.wrong {
            background-color: #ffebee;
            border-color: var(--error-color);
            color: #c62828;
        }

        .option-btn[disabled] {
            cursor: not-allowed;
        }

        .result-box {
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 20px;
            min-height: 30px;
        }

        .result-box.correct-text { color: var(--success-color); }
        .result-box.wrong-text { color: var(--error-color); }

        .next-btn {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            display: none;
            transition: background-color 0.2s;
        }

        .next-btn:hover {
            background-color: #357abd;
        }

        /* 結果画面用 */
        .summary-box {
            text-align: center;
            padding: 20px 0;
        }
        .summary-title {
            font-size: 1.5rem;
            margin-bottom: 15px;
        }
        .restart-btn {
            background-color: var(--success-color);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="quiz-container" id="quiz">
    <div class="header">
        <div class="progress" id="progress">Question 1/10</div>
        <div class="score" id="score-display">Score: 0</div>
    </div>
    
    <div class="question-box" id="question">問題文がここに表示されます</div>
    
    <div class="options-container" id="options">
        <button class="option-btn" onclick="checkAnswer(0)">選択肢 1</button>
        <button class="option-btn" onclick="checkAnswer(1)">選択肢 2</button>
        <button class="option-btn" onclick="checkAnswer(2)">選択肢 3</button>
        <button class="option-btn" onclick="checkAnswer(3)">選択肢 4</button>
    </div>
    
    <div class="result-box" id="result-message"></div>
    
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">次の問題へ ➔</button>
</div>

<script>
// 【重要】ここにクイズのデータを格納しています。
// 自分で問題を追加・変更したい場合は、この配列のルール（形式）に合わせて編集してください。
const quizData = [
    // --- ERモデル ---
    {
        question: "ERモデルにおいて、「実世界において識別可能な物体や事象」を何と呼ぶか？",
        options: ["実体 (Entity)", "関連 (Relationship)", "属性 (Attribute)", "ドメイン (Domain)"],
        correct: "実体 (Entity)"
    },
    {
        question: "ER図において、EmployeesやDepartmentsのように「同様の実体の集合」を表す概念はどれか？",
        options: ["実体集合 (Entity Set)", "関連集合 (Relationship Set)", "属性集合", "クラス"],
        correct: "実体集合 (Entity Set)"
    },
    {
        question: "実体や関連が持つ、それぞれの「性質や特徴を表す情報」を何と呼ぶか？",
        options: ["属性 (Attribute)", "実体 (Entity)", "ドメイン (Domain)", "インスタンス"],
        correct: "属性 (Attribute)"
    },
    {
        question: "属性が取り得る値の範囲や型（例：20文字以内の文字列、正の整数など）を何と呼ぶか？",
        options: ["定義域 (Domain)", "スキーマ (Schema)", "キー (Key)", "インスタンス"],
        correct: "定義域 (Domain)"
    },
    {
        question: "実体集合において、「実体を一意に識別できる属性の極小集合」を何と呼ぶか？",
        options: ["キー (Key)", "ドメイン (Domain)", "値 (Value)", "インデックス"],
        correct: "キー (Key)"
    },
    {
        question: "ERモデルにおいて、「複数個の実体間の対応（結びつき）」を何と呼ぶか？",
        options: ["関連 (Relationship)", "実体 (Entity)", "属性 (Attribute)", "結合 (Join)"],
        correct: "関連 (Relationship)"
    },
    {
        question: "ER図において、関連そのものが持つ性質を表す属性（例：Works_In関連が持つsince属性など）を何と呼ぶか？",
        options: ["記述的属性 (Descriptive Attribute)", "主キー属性", "外部キー属性", "派生属性"],
        correct: "記述的属性 (Descriptive Attribute)"
    },
    {
        question: "ER図における「参加制約」において、ある実体集合のすべての実体が必ず関連に参加しなければならない制約を何というか？",
        options: ["全参加 (Total Participation / 太線)", "部分参加 (Partial Participation / 細線)", "キー制約", "多対多"],

    {
        question: "「1人の従業員は最大1つの部門しか管理（Manages）できない」というような、関連の対応数の上限を決める制約を何というか？",

    {
        question: "独自の主キーを持たず、他方の実体（親実体）が存在しないと一意に識別できない実体集合を何というか？",

        correct: "弱実体集合 (Weak Entity Set / 二重長方形)"
    },
    {
        question: "弱実体集合を親実体と結びつけるための、二重ひし形で表される関連を何と呼ぶか？",

    {

    // --- 関係モデル(1)：データ構造と制約 ---

        question: "関係データベースの基礎となる「関係モデル（リレーショナルモデル）」を1970年に提案した人物は誰か？",
        options: ["Edgar F. Codd", "Alan Turing", "Donald Knuth", "James Gosling"],

    {
        question: "関係モデルにおける「関係（リレーション）」とは、直積集合の何であると定義されるか？",
        options: ["有限部分集合", "空集合", "補集合", "無限集合"],
        correct: "有限部分集合"
    },
    {
        question: "関係モデルの用語において、テーブル（表）の「列」に該当する言葉はどれか？",

        correct: "属性 (Attribute)"

        question: "関係モデルの用語において、テーブル（表）の「行（レコード）」に該当する言葉はどれか？",

        question: "関係の構造（属性名の並び）を定義したものを「関係スキーマ」と呼ぶのに対し、具体的なデータ（行の集まり）が入った状態を何というか？",

        question: "関係モデルにおいて、関係が持つ「属性の個数（列の数）」を何と呼ぶか？",

    },
    {
        question: "制約において、「主キーを構成する属性の値は、空値（NULL）であってはならない」という制約はどれか？",
        options: ["エンティティ整合性制約", "ドメイン制約", "一意性制約", "参照整合性制約"],
        correct: "エンティティ整合性制約"
    },
    {
        question: "制約において、「外部キーの値は、参照先関係の主キーに存在する値か、または空値（NULL）でなければならない」という制約はどれか？",
        options: ["参照整合性制約", "ドメイン制約", "一意性制約", "エンティティ整合性制約"],
        correct: "参照整合性制約"
    },

    // --- 関係モデル(2)：関係代数 ---
    {
        question: "2つの関係 R と S の「和 (R ∪ S)」が定義できるための必須の条件（両者が同じ属性構造を持っていること）を何というか？",
        options: ["和両立 (Union-Compatible)", "結合可能 (Joinable)", "同値 (Equivalent)", "直交 (Orthogonal)"],
        correct: "和両立 (Union-Compatible)"
    },
    {
        question: "関係代数において、「関係 R に含まれ、かつ関係 S には含まれないタプルの集合」を導出する演算（R － S）はどれか？",
        options: ["差 (Difference)", "和 (Union)", "交わり (Intersection)", "直積 (Cartesian Product)"],
        correct: "差 (Difference)"
    },
    {
        question: "関係代数において、「関係 R と関係 S の両方に共通して含まれるタプルの集合」を導出する演算（R ∩ S）はどれか？",

    },
    {
        question: "関係代数において、直積をとった後に、特定の結合条件に合致するタプルのみを取り出す演算（記号 ⋈）を何というか？",

        correct: "結合 (Join)"
    },
    {
        question: "結合演算（⋈）の中でも、共通する同名の属性の値が等しいタプル同士を結合し、重複した属性列を自動で1つにまとめる演算を何というか？",
        options: ["自然結合 (Natural Join)", "Θ結合 (シータ結合)", "等結合", "外結合"],
        correct: "自然結合 (Natural Join)"
    },
    {
        question: "関係代数において、関係の属性名（列名）を一時的に別の名前に変更する演算（記号 ρ：ロー）を何というか？",
        options: ["属性名の変更 (Rename)", "射影 (Projection)", "商 (Division)", "選択 (Selection)"],
        correct: "属性名の変更 (Rename)"
    },
    {
        question: "関係代数において、特定の条件を満たす行（タプル）を抽出する「選択（σ）」と、特定の列（属性）を抽出する「射影（π）」の大きな違いはどれか？",
        options: ["射影（π）は結果から重複するタプル（行）を自動的に排除する", "選択（σ）は結果から重複する行を排除する", "どちらも重複は排除しない", "射影は列数を増やす演算である"],
        correct: "射影（π）は結果から重複するタプル（行）を自動的に排除する"
    },

    // --- 関係モデル(3)：関係論理 ---

        question: "関係に対するデータ操作の記述において、「関係代数」が『手続き的』であるのに対し、「関係論理」はどのような特徴を持つか？",

    },
    {

        correct: "タプル関係論理"
    },
    {

    {

    {
        question: "SQLの列制約において、その列に値を省略すること（空値の挿入）を禁止する制約はどれか？",
        options: ["NOT NULL", "PRIMARY KEY", "UNIQUE", "FOREIGN KEY"],
        correct: "NOT NULL"
    },
    {
        question: "テーブルに新しい行（レコード）を挿入するために使用するデータ操作コマンド（DML）はどれか？",
        options: ["INSERT INTO", "UPDATE", "ADD ROW", "DELETE FROM"],
        correct: "INSERT INTO"
    },
    {
        question: "テーブル内の既存の特定のデータを書き換える（修正する）ために使用するデータ操作コマンド（DML）はどれか？",
        options: ["UPDATE", "INSERT INTO", "ALTER TABLE", "REPLACE"],
        correct: "UPDATE"
    },
    {
        question: "テーブル内の特定の行を削除するコマンドは「DELETE FROM <テーブル名> WHERE <条件>」であるが、WHERE句を省略するとどうなるか？",
        options: ["テーブル内のすべての行が削除される", "エラーになり実行されない", "最初の1行だけが削除される", "何も削除されない"],
        correct: "テーブル内のすべての行が削除される"
    },
    {
        question: "SQLにおいて、1つのテーブルに「e1」「e2」などの異なる相関名（別名）を与えて、同一テーブルの行同士を結合する手法を何というか？",
        options: ["自己結合 (Self-Join)", "内部結合", "自然結合", "外部結合"],
        correct: "自己結合 (Self-Join)"
    },
    {
        question: "SQLのWHERE句やFROM句の中に、さらに入れ子（ネスト）にして記述される別のSELECT文のことを何というか？",
        options: ["副問合せ (サブクエリ)", "主問合せ (メインクエリ)", "相関クエリ", "ビュー"],
        correct: "副問合せ (サブクエリ)"
    },
    {
        question: "副問合せの中でも、内側のクエリが外側の（主問合せの）テーブルの値を1行ずつ参照しながら実行される、処理効率に注意が必要な複雑な副問合せを何というか？",
        options: ["相関副問合せ (Correlated Subquery)", "単一非相関副問合せ", "インラインビュー", "自己結合問合せ"],
        correct: "相関副問合せ (Correlated Subquery)"
    }
];

let currentQuestionIndex = 0;
let score = 0;
let shuffledOptions = [];

// クイズの初期化・開始
function startQuiz() {
    // 問題の順番をランダムにしたい場合はここをシャffleする処理を入れますが、
    // まずは毎回しっかり固定パターンで復習できるようそのままにしています。
    currentQuestionIndex = 0;
    score = 0;
    showQuestion();
}

// 問題を表示する
function showQuestion() {
    resetState();
    
    const currentQuestion = quizData[currentQuestionIndex];
    
    // ヘッダーの更新
    document.getElementById("progress").innerText = `Question ${currentQuestionIndex + 1}/${quizData.length}`;
    document.getElementById("score-display").innerText = `Score: ${score}`;
    
    // 問題文の表示
    document.getElementById("question").innerText = currentQuestion.question;
    
    // 選択肢のシャッフル（毎回ボタンの配置が変わるようにする）
    shuffledOptions = [...currentQuestion.options];
    shuffledOptions.sort(() => Math.random() - 0.5);
    
    // ボタンへの割り当て
    const optionsContainer = document.getElementById("options");
    optionsContainer.innerHTML = "";
    
    shuffledOptions.forEach((option, index) => {
        const button = document.createElement("button");
        button.classList.add("option-btn");
        button.innerText = option;
        button.addEventListener("click", () => checkAnswer(option, button));
        optionsContainer.appendChild(button);
    });
}

// 状態のリセット（次の問題へ進むとき用）
function resetState() {
    document.getElementById("next-btn").style.display = "none";
    const msg = document.getElementById("result-message");
    msg.innerText = "";
    msg.className = "result-box";
}

// 正誤判定
function checkAnswer(selectedOption, clickedButton) {
    const currentQuestion = quizData[currentQuestionIndex];
    const allButtons = document.querySelectorAll(".option-btn");
    const msg = document.getElementById("result-message");
    
    // すべてのボタンを無効化（2度押し防止）
    allButtons.forEach(btn => btn.disabled = true);
    
    if (selectedOption === currentQuestion.correct) {
        // 正解の場合
        clickedButton.classList.add("correct");
        msg.innerText = "正解！ 🎉";
        msg.classList.add("correct-text");
        score++;
        document.getElementById("score-display").innerText = `Score: ${score}`;
    } else {
        // 不正解の場合
        clickedButton.classList.add("wrong");
        msg.innerText = `残念！ ❌ 正解は「${currentQuestion.correct}」`;
        msg.classList.add("wrong-text");
        
        // 正解のボタンをハイライトしてあげる
        allButtons.forEach(btn => {
            if (btn.innerText === currentQuestion.correct) {
                btn.classList.add("correct");
            }
        });
    }
    
    // 「次の問題へ」ボタンを表示
    document.getElementById("next-btn").style.display = "block";
}

// 次の問題に進む、または終了画面
function nextQuestion() {
    currentQuestionIndex++;
    
    if (currentQuestionIndex < quizData.length) {
        showQuestion();
    } else {
        showSummary();
    }
}

// 結果発表画面
function showSummary() {
    const quizContainer = document.getElementById("quiz");
    const accuracy = Math.round((score / quizData.length) * 100);
    
    quizContainer.innerHTML = `
        <div class="summary-box">
            <div class="summary-title"> 🎉 テスト終了！ 🎉</div>
            <p style="font-size: 1.2rem; margin: 20px 0;">
                あなたのスコア: <strong>${score} / ${quizData.length}</strong> 問題<br>
                （正解率: ${accuracy}%）
            </p>
            <p style="color: #718096; font-size: 0.9rem; line-height: 1.5;">
                ${accuracy === 100 ? '完璧です！中間テストは貰いましたね！' : '間違えたところを講義資料で復習して、満点を目指しましょう！'}
            </p>
            <button class="restart-btn" onclick="window.location.reload()">もう一度挑戦する</button>
        </div>
    `;
}

// アプリ起動
startQuiz();
</script>
